# SLF4J Simple Logger Configuration
# Default log level
org.slf4j.simpleLogger.defaultLogLevel=error

# Suppress OpenHTMLToPDF verbose logs
org.slf4j.simpleLogger.log.com.openhtmltopdf=error

# Keep our application logs at info level
org.slf4j.simpleLogger.log.com.jmeter.plugin=error

# Show date/time in logs
org.slf4j.simpleLogger.showDateTime=false

# Show thread name
org.slf4j.simpleLogger.showThreadName=false

# Show log name
org.slf4j.simpleLogger.showLogName=false

# Show short log name
org.slf4j.simpleLogger.showShortLogName=false
